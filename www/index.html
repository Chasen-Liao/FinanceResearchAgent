<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资研究与决策支持Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-box h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .stock-header {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stock-header h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .stock-header .symbol {
            color: #666;
            font-size: 0.9rem;
        }

        .stock-header .price {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            margin: 15px 0;
        }

        .stock-header .change {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .change.positive {
            background: #e6f7ed;
            color: #0e8029;
        }

        .change.negative {
            background: #ffeaea;
            color: #c41e3a;
        }

        .signal-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            margin-left: 15px;
        }

        .signal-badge.buy {
            background: #0e8029;
            color: white;
        }

        .signal-badge.sell {
            background: #c41e3a;
            color: white;
        }

        .signal-badge.hold {
            background: #666;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 1.1rem;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 0.9rem;
        }

        .metric-value {
            font-weight: 600;
            color: #333;
        }

        .signal-reason {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 5px 0;
            font-size: 0.9rem;
            color: #555;
        }

        .error {
            background: #ffeaea;
            color: #c41e3a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .quick-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            color: #333;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .quick-btn:hover {
            background: #e0e0e0;
        }

        .market-indices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .index-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .index-card .name {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .index-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .index-card .change {
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>投资研究Agent</h1>
            <p>基于Deep Agents + LangChain的智能投资分析助手</p>
        </header>

        <div class="search-box">
            <h2>🔍 股票分析</h2>
            <div class="input-group">
                <input type="text" id="symbolInput" placeholder="输入股票代码 (如: AAPL, MSFT, TSLA)" onkeypress="handleKeyPress(event)">
                <button onclick="analyzeStock()" id="analyzeBtn">分析</button>
            </div>
            <div class="quick-actions">
                <span>快速分析:</span>
                <button class="quick-btn" onclick="quickAnalyze('AAPL')">Apple</button>
                <button class="quick-btn" onclick="quickAnalyze('MSFT')">Microsoft</button>
                <button class="quick-btn" onclick="quickAnalyze('GOOGL')">Google</button>
                <button class="quick-btn" onclick="quickAnalyze('TSLA')">Tesla</button>
                <button class="quick-btn" onclick="quickAnalyze('NVDA')">NVIDIA</button>
            </div>
        </div>

        <div class="loading" id="loading">
            正在分析...
        </div>

        <div class="error" id="error" style="display: none;"></div>

        <div class="results" id="results">
            <div class="stock-header">
                <h2 id="stockName">--</h2>
                <span class="symbol" id="stockSymbol">--</span>
                <div class="price" id="stockPrice">$0.00</div>
                <span class="change positive" id="priceChange">+0.00%</span>
                <span class="signal-badge" id="signalBadge">持有</span>
            </div>

            <div class="grid">
                <div class="card">
                    <h3>📊 技术指标</h3>
                    <div id="technicalMetrics"></div>
                </div>

                <div class="card">
                    <h3>📈 趋势分析</h3>
                    <div id="trendMetrics"></div>
                </div>

                <div class="card">
                    <h3>💰 基本面</h3>
                    <div id="fundamentalMetrics"></div>
                </div>

                <div class="card">
                    <h3>⚠️ 交易信号</h3>
                    <div id="signalInfo">
                        <div class="signal-reason" id="signalReason">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 端口配置
        const API_PORT = '8001';
        const API_BASE = window.location.hostname === 'localhost'
            ? `http://localhost:${API_PORT}`
            : '';

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                analyzeStock();
            }
        }

        function quickAnalyze(symbol) {
            document.getElementById('symbolInput').value = symbol;
            analyzeStock();
        }

        async function analyzeStock() {
            const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            if (!symbol) {
                showError('请输入股票代码');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/api/analysis/${symbol}`);

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '获取数据失败');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(data) {
            document.getElementById('results').style.display = 'block';

            // 股票基本信息
            document.getElementById('stockName').textContent = data.name || data.symbol;
            document.getElementById('stockSymbol').textContent = data.symbol;
            document.getElementById('stockPrice').textContent = `$${data.current_price.toFixed(2)}`;

            // 价格变化
            const trend = data.trend || {};
            const change = trend.change_1d || 0;
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeEl.className = `change ${change >= 0 ? 'positive' : 'negative'}`;

            // 信号
            const signal = data.signal || {};
            const signalEl = document.getElementById('signalBadge');
            const signalText = signal.signal || 'hold';
            signalEl.textContent = signalText.toUpperCase();
            signalEl.className = `signal-badge ${signalText}`;

            // 技术指标
            const tech = data.technical || {};
            const techHtml = `
                <div class="metric"><span class="metric-label">MA5</span><span class="metric-value">$${(tech.ma5 || 0).toFixed(2)}</span></div>
                <div class="metric"><span class="metric-label">MA20</span><span class="metric-value">$${(tech.ma20 || 0).toFixed(2)}</span></div>
                <div class="metric"><span class="metric-label">RSI(14)</span><span class="metric-value">${(tech.rsi || 0).toFixed(1)}</span></div>
                <div class="metric"><span class="metric-label">MACD</span><span class="metric-value">${(tech.macd || 0).toFixed(2)}</span></div>
                <div class="metric"><span class="metric-label">成交量</span><span class="metric-value">${formatVolume(tech.volume)}</span></div>
            `;
            document.getElementById('technicalMetrics').innerHTML = techHtml;

            // 趋势
            const trendHtml = `
                <div class="metric"><span class="metric-label">趋势方向</span><span class="metric-value">${trend.trend || 'N/A'}</span></div>
                <div class="metric"><span class="metric-label">日涨跌</span><span class="metric-value">${(trend.change_1d || 0).toFixed(2)}%</span></div>
                <div class="metric"><span class="metric-label">周涨跌</span><span class="metric-value">${(trend.change_1w || 0).toFixed(2)}%</span></div>
                <div class="metric"><span class="metric-label">月涨跌</span><span class="metric-value">${(trend.change_1m || 0).toFixed(2)}%</span></div>
                <div class="metric"><span class="metric-label">置信度</span><span class="metric-value">${((signal.confidence || 0) * 100).toFixed(0)}%</span></div>
            `;
            document.getElementById('trendMetrics').innerHTML = trendHtml;

            // 基本面
            const fund = data.fundamentals || {};
            const fundHtml = `
                <div class="metric"><span class="metric-label">市盈率 (P/E)</span><span class="metric-value">${fund.pe_ratio ? fund.pe_ratio.toFixed(2) : 'N/A'}</span></div>
                <div class="metric"><span class="metric-label">市净率 (P/B)</span><span class="metric-value">${fund.pb_ratio ? fund.pb_ratio.toFixed(2) : 'N/A'}</span></div>
                <div class="metric"><span class="metric-label">ROE</span><span class="metric-value">${fund.roe ? (fund.roe * 100).toFixed(1) + '%' : 'N/A'}</span></div>
                <div class="metric"><span class="metric-label">营收增长</span><span class="metric-value">${fund.revenue_growth ? (fund.revenue_growth * 100).toFixed(1) + '%' : 'N/A'}</span></div>
                <div class="metric"><span class="metric-label">分析师评级</span><span class="metric-value">${fund.analyst_rating || 'N/A'}</span></div>
            `;
            document.getElementById('fundamentalMetrics').innerHTML = fundHtml;

            // 信号原因
            const reasons = signal.reasons || [];
            const reasonsHtml = reasons.length > 0
                ? reasons.map(r => `<div class="signal-reason">${r}</div>`).join('')
                : '<div class="signal-reason">综合分析中...</div>';
            document.getElementById('signalReason').innerHTML = reasonsHtml;
        }

        function formatVolume(vol) {
            if (!vol) return 'N/A';
            if (vol >= 1e9) return (vol / 1e9).toFixed(1) + 'B';
            if (vol >= 1e6) return (vol / 1e6).toFixed(1) + 'M';
            if (vol >= 1e3) return (vol / 1e3).toFixed(1) + 'K';
            return vol;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = show;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
